name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}                        # e.g. myregistry.azurecr.io
  ACR_REPOSITORY: ${{ secrets.ACR_REPOSITORY }}                    # e.g. my-app
  CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
  CONTAINER_APP_RESOURCE_GROUP: ${{ secrets.CONTAINER_APP_RESOURCE_GROUP }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_REGISTRY }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_NAME=${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:${IMAGE_TAG}

          docker build \
            --file src/Dockerfile \
            --tag "${IMAGE_NAME}" \
            ./src

          docker push "${IMAGE_NAME}"

      - name: Deploy to Azure Container App
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_NAME=${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:${IMAGE_TAG}

          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.CONTAINER_APP_RESOURCE_GROUP }} \
            --image "${IMAGE_NAME}" \
            --set-env-vars \
              FOUNDRY_ENDPOINT="${{ secrets.FOUNDRY_ENDPOINT }}" \
              gpt_endpoint="${{ secrets.GPT_ENDPOINT }}" \
              embedding_endpoint="${{ secrets.EMBEDDING_ENDPOINT }}" \
              phi_4_endpoint="${{ secrets.PHI_4_ENDPOINT }}"

      - name: Log out of Azure
        if: always()
        run: az logout
